name: Deploy presentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JBang
        uses: jbangdev/setup-jbang@v0.1.1
        with:
          version: latest

      - name: Render slides
        run: |
          jbang --java 25 adoc2reveal.java index.adoc

      - name: Prepare Pages artifact
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html dist/
          cp -R css dist/
          cp -R images dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
