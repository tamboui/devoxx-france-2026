<script>
// Auto-advance when the YouTube opener video ends.
//
// YouTube's postMessage API requires two steps:
//  1. Find the background iframe reveal.js created and send it an
//     "addEventListener" command so it starts emitting state events.
//  2. Listen for those events; playerState 0 = ended → Reveal.next().

(function () {
  var subscribed = false;

  function subscribeToYouTube() {
    // reveal.js puts background iframes inside .slide-background elements
    var iframe = document.querySelector('.slide-background:first-child iframe');
    if (!iframe) return false;

    function send() {
      try {
        iframe.contentWindow.postMessage(JSON.stringify({
          event: 'command',
          func: 'addEventListener',
          args: ['onStateChange']
        }), 'https://www.youtube.com');
        subscribed = true;
      } catch (e) { /* iframe not ready yet */ }
    }

    // Send as soon as the iframe reports loaded, and once right now in
    // case it is already loaded (e.g. after a page refresh).
    iframe.addEventListener('load', send);
    send();
    return true;
  }

  // Poll until reveal.js has created the background iframe.
  var poll = setInterval(function () {
    if (subscribeToYouTube()) clearInterval(poll);
  }, 200);

  // Listen for YouTube postMessage events.
  window.addEventListener('message', function (event) {
    if (event.origin !== 'https://www.youtube.com') return;
    try {
      var data = JSON.parse(event.data);
      // Format 1: {"event":"onStateChange","info":0}
      if (data.event === 'onStateChange' && data.info === 0) {
        Reveal.next();
      }
      // Format 2: {"event":"infoDelivery","info":{"playerState":0}}
      if (data.event === 'infoDelivery' &&
          data.info && data.info.playerState === 0) {
        Reveal.next();
      }
    } catch (e) { /* ignore non-JSON messages */ }
  });
}());
</script>
